# MLIP Model Information
# family: Model family (MACE, SevenNet, Orb, Equiformer, UMA, eSCN)
# target: Energy prediction target (adsorption_energy or total_energy)
# output_layer: Name of energy prediction block in model (to be determined)
# normalize_std/mean: Normalization parameters for energy predictions

models:
  # Equiformer Family
  eq2_121M_e4_f100_oc22_s2ef:
    family: "Equiformer"
    model: "EquiformerV2"
    path: "/DATA/user_scratch/pn50212/2024/12_AtomAttention/MLPs/eq2_121M_e4_f100_oc22_s2ef.pt"
    output_layer: null
    target: "total_energy"
    normalize_std: 1.0
    normalize_mean: 0.0

  # UMA Family
